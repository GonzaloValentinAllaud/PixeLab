<svg viewBox="0 0 560 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#00F0FF"/>
    </linearGradient>
    <linearGradient id="gradSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B0ACFF"/>
      <stop offset="100%" stop-color="#9BF3FF"/>
    </linearGradient>
  </defs>

  <!-- Icono: bloques de pixeles formando un matraz de laboratorio -->
  <g transform="translate(30, 20)">
    <!-- cuello del matraz hecho de pixeles -->
    <rect x="62" y="0" width="16" height="16" rx="3" fill="url(#gradMain)"/>
    <rect x="62" y="20" width="16" height="16" rx="3" fill="url(#gradMain)"/>

    <!-- cuerpo del matraz en forma de pixeles, ensanchandose -->
    <rect x="44" y="40" width="16" height="16" rx="3" fill="url(#gradMain)"/>
    <rect x="80" y="40" width="16" height="16" rx="3" fill="url(#gradMain)"/>

    <rect x="26" y="60" width="16" height="16" rx="3" fill="url(#gradSoft)"/>
    <rect x="98" y="60" width="16" height="16" rx="3" fill="url(#gradSoft)"/>

    <rect x="8"  y="80" width="16" height="16" rx="3" fill="url(#gradMain)"/>
    <rect x="26" y="80" width="16" height="16" rx="3" fill="url(#gradSoft)"/>
    <rect x="44" y="80" width="16" height="16" rx="3" fill="url(#gradSoft)"/>
    <rect x="62" y="80" width="16" height="16" rx="3" fill="url(#gradSoft)"/>
    <rect x="80" y="80" width="16" height="16" rx="3" fill="url(#gradSoft)"/>
    <rect x="98" y="80" width="16" height="16" rx="3" fill="url(#gradSoft)"/>
    <rect x="116" y="80" width="16" height="16" rx="3" fill="url(#gradMain)"/>

    <!-- base del matraz -->
    <rect x="0"   y="100" width="140" height="16" rx="3" fill="url(#gradMain)"/>

    <!-- burbuja flotante extra, sugiere "experimentacion / ideas" -->
    <circle cx="120" cy="30" r="7" fill="#00F0FF" opacity="0.9"/>
    <circle cx="14" cy="45" r="5" fill="#6C63FF" opacity="0.8"/>
  </g>

  <!-- Wordmark, centrado verticalmente respecto al icono -->
  <g transform="translate(200, 100)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="56" font-weight="800" fill="#1E1B2E">Pixe<tspan fill="url(#gradMain)">Lab</tspan></text>
  </g>
</svg>
