    <link rel="stylesheet" href="../css/main.css" />

</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand" href="/index.html">
                    <img src="/images/pixelab-logo.svg" alt="PixeLab" height="50">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="/pages/servicios.html">Servicios</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/pages/proyectos.html">Proyectos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/pages/nosotros.html">Nosotros</a>

                        <li class="nav-item">
                            <a class="nav-link" href="/pages/contactos.html">Contacto</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <section class="contacto">
        <h1>¿Listo para hacer crecer tu marca?<br><span>Hablemos</span><br></h1>
        <p>Contanos tu proyecto, te respondemos en 24hs.</p>
    </section>
    <section class="informacion-contacto">
        <div>
            <h2>Mandanos un mail</h2>
            <p>¡Escríbenos y te contactaremos lo antes posible!</p>
        </div>
        <form class="formulario-contacto">
            <div class="mb-3">
                <label for="exampleFormControlInput1" class="form-label">NOMBRE Y APELLIDO</label>
                <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="Gonzalo Allaud">
            </div>
            <div class="mb-3">
                <label for="exampleFormControlInput1" class="form-label">EMAIL</label>
                <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com">
            </div>
            <div class="mb-3">
                <label for="exampleFormControlTextarea1" class="form-label">INFO QUE QUIERAS COMPARTIRNOS</label>
                <textarea class="form-control" id="exampleFormControlTextarea1" rows="3" placeholder="Contanos sobre tu negocio, desafios actuales, o lo que consideres importante para recibir una propuesta de PixeLab"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
